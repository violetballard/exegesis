name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh quality-*.sh typecheck-test.sh

      - name: Run CI entrypoint
        run: make ci
