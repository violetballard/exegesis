version: 1

# Engine users: choose a profile for local runtime behavior.
# Studio users: Studio can auto-select based on detected unified memory, but it’s the same schema.
active_profile: local-128   # local-32|48|64|96|128|192|256|512

profile:
  # Engine policy mode:
  # - confidential: local-only hard gate
  # - standard: online-capable profile (cloud still blocked unless online_overrides.enabled=true)
  mode: confidential   # confidential | standard

  # Confidential mode is enforced by the engine: only localhost endpoints allowed.
  require_localhost_llm_when_confidential: true
  forbid_network_tools_when_confidential: true

providers:
  # Local OpenAI-compatible endpoint (Studio embedded llama-server OR LM Studio)
  local_openai:
    type: openai_compat
    base_url: "http://127.0.0.1:1234/v1"
    api_key: ""
    require_localhost: true
    require_auth: false
    timeouts: { connect_seconds: 3, request_seconds: 120 }
    streaming: { preferred: true, required: false }

  # OpenAI (or any OpenAI-compatible cloud endpoint)
  openai_cloud:
    type: openai_compat
    base_url: "https://api.openai.com/v1"
    api_key: ""
    require_localhost: false
    require_auth: true
    timeouts: { connect_seconds: 5, request_seconds: 180 }
    streaming: { preferred: true, required: false }

  # Anthropic Claude
  anthropic:
    type: anthropic
    base_url: "https://api.anthropic.com"
    api_key: ""
    require_auth: true
    timeouts: { connect_seconds: 5, request_seconds: 180 }
    streaming: { preferred: true, required: false }

policy:
  # Provider gating (engine authoritative).
  # In standard mode, non-local providers still require online_overrides.enabled=true.
  allowed_providers:
    confidential: [local_openai]
    standard: [local_openai, openai_cloud, anthropic]

  # Default cloud sending constraints (engine enforces for any non-local provider).
  cloud_send_policy_default: context_sets_only   # context_sets_only | allow_full_doc
  # Full-doc access is never default and must be explicitly enabled per-run.
  require_per_run_full_doc_flag: true

  tool_calling:
    strict_json_only: true
    schema_validation: true
    retry_on_invalid: 1
    max_tool_calls_per_turn: 3
    text_fallback:
      enabled: true
      format: json_only
      strip_think_tags: true

limits:
  max_input_tokens: 20000
  max_output_tokens:
    terminal: 800
    planner: 800
    editor: 1200
    bulk_best: 4000
  concurrency:
    max_inflight_requests: 2

models:
  # Catalog entries are symbolic keys. Each role points to one of these.
  # For openai_compat providers, model ids must match what the endpoint exposes.
  mistral-small:
    capabilities: { text: true, vision: false, tools: false }
    defaults:
      weight_quant: Q8_0
      context_max: 32768
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.3, top_p: 0.9, top_k: 40 }
      max_output_tokens: 1200

  magistral-small:
    capabilities: { text: true, vision: false, tools: true } # set vision:true only for a vision-capable build
    defaults:
      weight_quant: Q8_0
      context_max: 32768
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.25, top_p: 0.9, top_k: 40 }
      max_output_tokens: 800

  qwen3-next-instruct:
    capabilities: { text: true, vision: false, tools: true }
    defaults:
      weight_quant: Q4_K_M
      context_max: 16384
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.25, top_p: 0.85, top_k: 40 }
      max_output_tokens: 800

  gpt-oss-120b:
    capabilities: { text: true, vision: false, tools: false }
    defaults:
      weight_quant: Q5_K_M
      context_max: 16384
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.35, top_p: 0.9, top_k: 40 }
      max_output_tokens: 4000

  # Cloud-only model example (optional)
  claude-sonnet:
    capabilities: { text: true, vision: false, tools: true }
    defaults:
      context_max: 200000
      max_output_tokens: 1200

roles:
  # Default routing is local-first. Standard profile may override specific roles when online_overrides are enabled.
  editor:        { provider: local_openai, model: mistral-small }
  voice_pass:    { provider: local_openai, model: mistral-small }

  terminal_chat: { provider: local_openai, model: magistral-small }
  planner_default:{ provider: local_openai, model: magistral-small }
  planner_deep:  { provider: local_openai, model: qwen3-next-instruct }

  bulk_fast:     { provider: local_openai, model: magistral-small }
  bulk_best:     { provider: local_openai, model: gpt-oss-120b }

  # Vision is just another role; can be overridden by power users.
  vision:        { provider: local_openai, model: magistral-small }

online_overrides:
  # Optional overrides for non-local providers in standard mode.
  # Must be explicitly enabled by user flow (frictionful) before cloud providers are used.
  enabled: false
  scope: project
  cloud_send_policy: context_sets_only

  # Example: use Claude for deep planning only (optional)
  roles:
    planner_deep: { provider: anthropic, model: claude-sonnet }

routing:
  terminal_escalation:
    enabled: true
    escalate_to_role: planner_deep
    when:
      operation_kinds: [terminal_tool_orchestration, terminal_outline_request]
      input_tokens_ge: 600
      constraints_count_ge: 6
      section_types: [discussion, conclusion]

  bulk_best_routing:
    enabled: true
    always_best_sections: [discussion, conclusion]
    word_count_threshold_general: 1500
    word_count_threshold_methods_findings: 2500

modes:
  hidden_planner:
    enabled: true
    role: planner_deep
    max_ctx: 16384

  drafting_mode:
    enabled: true
    role: bulk_best
    max_ctx: 16384
    always_run_editor_pass_after: true

  on_demand:
    enabled: true
    roles: [planner_deep, bulk_best]
    unload_idle_seconds:
      planner_deep: 600
      bulk_best: 900

kv_cache:
  defaults: { k: f16, v: q8_0 }
  per_model: {}

context_max:
  mistral-small: 32768
  magistral-small: 32768
  qwen3-next-instruct: 16384
  gpt-oss-120b: 16384
  claude-sonnet: 200000

pageindex:
  enabled: true
  agent_role: terminal_chat
  vision:
    enabled: true
    role: vision
    require_runtime_image_input: true
    require_model_vision_capability: true
    scanned_pdf:
      min_text_chars_threshold: 2000
      enable_vision_read_pages: true
      max_pages_per_call: 3
  build:
    max_depth: 6
    include_node_summaries: true
  query:
    max_results_per_doc: 3

retrieval:
  fts: true
  pageindex: true
  embeddings: true
  shortlist_docs: 25
  final_max_hits: 10

export:
  default_style: apa
  default_template: default
  require_export_confirmation: true

# Local runtime profiles: these are NOT product SKUs.
# They are reference configurations for local inference behavior (ctx/kv/quant + mode usage).
profiles:
  local-32:
    description: "32GB minimum. Swap-first. No Qwen, no GPT. Stable."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 8192, magistral-small: 8192 }
    model_overrides:
      mistral-small:   { weight_quant: Q5_K_M, context_max: 8192 }
      magistral-small: { weight_quant: Q5_K_M, context_max: 8192 }
    modes: { hidden_planner: { enabled: false }, drafting_mode: { enabled: false }, on_demand: { enabled: false } }

  local-48:
    description: "48GB. Two-model local. No Qwen, no GPT."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 16384, magistral-small: 16384 }
    model_overrides:
      mistral-small:   { weight_quant: Q6_K, context_max: 16384 }
      magistral-small: { weight_quant: Q6_K, context_max: 16384 }
    modes: { hidden_planner: { enabled: false }, drafting_mode: { enabled: false }, on_demand: { enabled: false } }

  local-64:
    description: "64GB. Stable small models. No Qwen, no GPT."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 16384, magistral-small: 16384 }
    model_overrides:
      mistral-small:   { weight_quant: Q8_0, context_max: 16384 }
      magistral-small: { weight_quant: Q8_0, context_max: 16384 }
    modes: { hidden_planner: { enabled: false }, drafting_mode: { enabled: false }, on_demand: { enabled: false } }

  local-96:
    description: "96GB. Larger ctx for small models. No GPT cutoff for Studio."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 24576, magistral-small: 24576 }
    model_overrides:
      mistral-small:   { weight_quant: Q8_0, context_max: 24576 }
      magistral-small: { weight_quant: Q8_0, context_max: 24576 }
    modes: { hidden_planner: { enabled: false }, drafting_mode: { enabled: false }, on_demand: { enabled: false } }

  local-128:
    description: "128GB. Swap-in Qwen deep planner + GPT bulk best."
    context_max:
      mistral-small: 32768
      magistral-small: 32768
      qwen3-next-instruct: 16384
      gpt-oss-120b: 16384
    model_overrides:
      qwen3-next-instruct: { weight_quant: Q4_K_M, context_max: 16384 }
      gpt-oss-120b:        { weight_quant: Q4_K_M, context_max: 16384 }
    modes:
      hidden_planner: { enabled: true, max_ctx: 16384 }
      drafting_mode:  { enabled: true, max_ctx: 16384 }
      on_demand:      { enabled: false }

  local-192:
    description: "192GB. Swap-in Qwen/GPT; more headroom for small models."
    context_max:
      mistral-small: 40960
      magistral-small: 40960
      qwen3-next-instruct: 16384
      gpt-oss-120b: 16384
    model_overrides:
      qwen3-next-instruct: { weight_quant: Q4_K_M, context_max: 16384 }
      gpt-oss-120b:        { weight_quant: Q4_K_M, context_max: 16384 }
    modes:
      hidden_planner: { enabled: true, max_ctx: 16384 }
      drafting_mode:  { enabled: true, max_ctx: 16384 }
      on_demand:      { enabled: false }

  local-256:
    description: "256GB. On-demand Qwen/GPT without forced eviction; unload on idle."
    context_max:
      mistral-small: 49152
      magistral-small: 49152
      qwen3-next-instruct: 32768
      gpt-oss-120b: 32768
    model_overrides:
      qwen3-next-instruct: { weight_quant: Q4_K_M, context_max: 32768 }
      gpt-oss-120b:        { weight_quant: Q5_K_M, context_max: 32768 }
    modes:
      hidden_planner: { enabled: false }
      drafting_mode:  { enabled: false }
      on_demand:
        enabled: true
        unload_idle_seconds: { planner_deep: 600, bulk_best: 900 }

  local-512:
    description: "512GB. Max accuracy KV V=f16 when supported."
    kv_cache_defaults: { k: f16, v: f16 }
    context_max:
      mistral-small: 65536
      magistral-small: 65536
      qwen3-next-instruct: 49152
      gpt-oss-120b: 49152
    model_overrides:
      mistral-small:        { weight_quant: Q8_0, context_max: 65536, kv_cache: { k: f16, v: f16 } }
      magistral-small:      { weight_quant: Q8_0, context_max: 65536, kv_cache: { k: f16, v: f16 } }
      qwen3-next-instruct:  { weight_quant: Q5_K_M, context_max: 49152, kv_cache: { k: f16, v: f16 } }
      gpt-oss-120b:         { weight_quant: Q5_K_M, context_max: 49152, kv_cache: { k: f16, v: f16 } }
    modes:
      hidden_planner: { enabled: false }
      drafting_mode:  { enabled: false }
      on_demand:      { enabled: false }
