version: 1

# Engine-first shared config for the current MVP.
# Current product focus:
# - Engine core
# - FTS retrieval
# - A2UI output contracts
# - future Exegesis Console client

active_profile: engine-128

profile:
  mode: confidential   # confidential | online
  require_localhost_llm_when_confidential: true
  forbid_network_tools_when_confidential: true

providers:
  local_openai:
    type: openai_compat
    base_url: "http://127.0.0.1:1234/v1"
    api_key: ""
    api_key_env: ""
    keychain_service: ""
    require_localhost: true
    require_auth: false
    timeouts: { connect_seconds: 3, request_seconds: 120 }
    streaming: { preferred: true, required: false }

  openai_cloud:
    type: openai_compat
    base_url: "https://api.openai.com/v1"
    api_key: ""
    api_key_env: "OPENAI_API_KEY"
    keychain_service: "exegesis/openai"
    require_localhost: false
    require_auth: true
    timeouts: { connect_seconds: 5, request_seconds: 180 }
    streaming: { preferred: true, required: false }

  anthropic:
    type: anthropic
    base_url: "https://api.anthropic.com"
    api_key: ""
    api_key_env: "ANTHROPIC_API_KEY"
    keychain_service: "exegesis/anthropic"
    require_auth: true
    timeouts: { connect_seconds: 5, request_seconds: 180 }
    streaming: { preferred: true, required: false }

  mistral:
    type: mistral
    base_url: "https://api.mistral.ai/v1"
    api_key: ""
    api_key_env: "MISTRAL_API_KEY"
    keychain_service: "exegesis/mistral"
    require_auth: true
    timeouts: { connect_seconds: 5, request_seconds: 180 }
    streaming: { preferred: true, required: false }

policy:
  project_mode_provider_allowlist:
    confidential: [local_openai]
    online: [local_openai, openai_cloud, anthropic, mistral]
  cloud_send_policy_default: context_sets_only
  require_per_run_full_doc_flag: true
  tool_calling:
    strict_json_only: true
    schema_validation: true
    retry_on_invalid: 1
    max_tool_calls_per_turn: 3
    text_fallback:
      enabled: true
      format: json_only
      strip_think_tags: true

limits:
  max_input_tokens: 20000
  max_output_tokens:
    terminal: 800
    planner: 800
    editor: 1200
    bulk_best: 4000
  concurrency:
    max_inflight_requests: 2

models:
  mistral-small:
    capabilities: { text: true, vision: false, tools: false }
    defaults:
      weight_quant: Q8_0
      context_max: 32768
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.3, top_p: 0.9, top_k: 40 }
      max_output_tokens: 1200

  magistral-small:
    capabilities: { text: true, vision: false, tools: true }
    defaults:
      weight_quant: Q8_0
      context_max: 32768
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.25, top_p: 0.9, top_k: 40 }
      max_output_tokens: 800

  qwen3-next-instruct:
    capabilities: { text: true, vision: false, tools: true }
    defaults:
      weight_quant: Q4_K_M
      context_max: 16384
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.25, top_p: 0.85, top_k: 40 }
      max_output_tokens: 800

  gpt-oss-120b:
    capabilities: { text: true, vision: false, tools: false }
    defaults:
      weight_quant: Q5_K_M
      context_max: 16384
      kv_cache: { k: f16, v: q8_0 }
      sampling: { temperature: 0.35, top_p: 0.9, top_k: 40 }
      max_output_tokens: 4000

  gpt-5.4:
    capabilities: { text: true, vision: false, tools: true }
    defaults:
      context_max: 128000
      max_output_tokens: 1200

  claude-sonnet:
    capabilities: { text: true, vision: false, tools: true }
    defaults:
      context_max: 200000
      max_output_tokens: 1200

  mistral-medium:
    capabilities: { text: true, vision: false, tools: true }
    defaults:
      context_max: 128000
      max_output_tokens: 1200

roles:
  editor:        { provider: local_openai, model: mistral-small }
  voice_pass:    { provider: local_openai, model: mistral-small }
  terminal_chat: { provider: local_openai, model: magistral-small }
  planner_default: { provider: local_openai, model: magistral-small }
  planner_deep:  { provider: local_openai, model: qwen3-next-instruct }
  bulk_fast:     { provider: local_openai, model: magistral-small }
  bulk_best:     { provider: local_openai, model: gpt-oss-120b }
  vision:        { provider: local_openai, model: magistral-small }

routing:
  terminal_escalation:
    enabled: true
    escalate_to_role: planner_deep
    when:
      operation_kinds: [terminal_tool_orchestration, terminal_outline_request]
      input_tokens_ge: 600
      constraints_count_ge: 6
      section_types: [discussion, conclusion]
  bulk_best_routing:
    enabled: true
    always_best_sections: [discussion, conclusion]
    word_count_threshold_general: 1500
    word_count_threshold_methods_findings: 2500

retrieval:
  fts: true
  pageindex: false
  embeddings: false
  shortlist_docs: 25
  final_max_hits: 10

export:
  default_style: apa
  default_template: default
  require_export_confirmation: true

profiles:
  engine-32:
    description: "32GB minimum. Small-model local only. Stable."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 8192, magistral-small: 8192 }
    model_overrides:
      mistral-small:   { weight_quant: Q5_K_M, context_max: 8192 }
      magistral-small: { weight_quant: Q5_K_M, context_max: 8192 }

  engine-48:
    description: "48GB. Two small local models."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 16384, magistral-small: 16384 }
    model_overrides:
      mistral-small:   { weight_quant: Q6_K, context_max: 16384 }
      magistral-small: { weight_quant: Q6_K, context_max: 16384 }

  engine-64:
    description: "64GB. Stable local small-model runtime."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 16384, magistral-small: 16384 }
    model_overrides:
      mistral-small:   { weight_quant: Q8_0, context_max: 16384 }
      magistral-small: { weight_quant: Q8_0, context_max: 16384 }

  engine-96:
    description: "96GB. More context headroom for local small models."
    roles_disable: [planner_deep, bulk_best]
    context_max: { mistral-small: 24576, magistral-small: 24576 }
    model_overrides:
      mistral-small:   { weight_quant: Q8_0, context_max: 24576 }
      magistral-small: { weight_quant: Q8_0, context_max: 24576 }

  engine-128:
    description: "128GB. Enables deeper local planner and bulk-best roles."
    context_max:
      mistral-small: 32768
      magistral-small: 32768
      qwen3-next-instruct: 16384
      gpt-oss-120b: 16384
    model_overrides:
      qwen3-next-instruct: { weight_quant: Q4_K_M, context_max: 16384 }
      gpt-oss-120b:        { weight_quant: Q4_K_M, context_max: 16384 }

  engine-192:
    description: "192GB. More small-model headroom and stable deep planner."
    context_max:
      mistral-small: 40960
      magistral-small: 40960
      qwen3-next-instruct: 16384
      gpt-oss-120b: 16384
    model_overrides:
      qwen3-next-instruct: { weight_quant: Q4_K_M, context_max: 16384 }
      gpt-oss-120b:        { weight_quant: Q4_K_M, context_max: 16384 }

  engine-256:
    description: "256GB. On-demand large local roles."
    context_max:
      mistral-small: 49152
      magistral-small: 49152
      qwen3-next-instruct: 32768
      gpt-oss-120b: 32768
    model_overrides:
      qwen3-next-instruct: { weight_quant: Q4_K_M, context_max: 32768 }
      gpt-oss-120b:        { weight_quant: Q5_K_M, context_max: 32768 }

  engine-512:
    description: "512GB. Max local context and higher-fidelity KV."
    kv_cache_defaults: { k: f16, v: f16 }
    context_max:
      mistral-small: 65536
      magistral-small: 65536
      qwen3-next-instruct: 49152
      gpt-oss-120b: 49152
    model_overrides:
      mistral-small:        { weight_quant: Q8_0, context_max: 65536, kv_cache: { k: f16, v: f16 } }
      magistral-small:      { weight_quant: Q8_0, context_max: 65536, kv_cache: { k: f16, v: f16 } }
      qwen3-next-instruct:  { weight_quant: Q5_K_M, context_max: 49152, kv_cache: { k: f16, v: f16 } }
      gpt-oss-120b:         { weight_quant: Q5_K_M, context_max: 49152, kv_cache: { k: f16, v: f16 } }
